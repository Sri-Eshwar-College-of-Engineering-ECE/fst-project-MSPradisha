<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#141414; color:white;">

<div class="container mt-5">
    <h2 class="mb-4">Add Movie 🎬</h2>

    <form action="/save" method="post" th:object="${movie}">
		<input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label>Title</label>
            <input type="text" class="form-control" th:field="*{title}">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>

        <div class="mb-3">
            <label>Rating</label>
            <input type="text" class="form-control" th:field="*{rating}">
        </div>

        <div class="mb-3">
            <label>Image URL</label>
            <input type="text" class="form-control" th:field="*{imageUrl}">
        </div>

        <button type="submit" class="btn btn-danger">Save Movie</button>
    </form>
</div>

</body>
</html>
