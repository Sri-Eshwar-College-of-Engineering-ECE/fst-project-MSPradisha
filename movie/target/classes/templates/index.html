<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<a href="/logout" class="btn btn-outline-light">Logout</a>
    <style>
        .card {
            transition: all 0.4s ease;
            border-radius: 10px;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.6);
        }

        .card img {
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-title {
            transition: color 0.3s;
        }

        .card:hover .card-title {
            color: #ff4c4c;
        }
    </style>
</head>

<body style="background-color:#141414; color:white;">

<div class="container mt-4">

    <h1 class="text-center mb-4">🎬 Movie Blog</h1>

    <div class="text-end mb-3">
        <a href="/add" class="btn btn-danger">+ Add Movie</a>
    </div>

    <div class="row">

        <!-- ✅ SINGLE LOOP -->
        <div class="col-md-3 mb-4" th:each="movie : ${movies}" th:if="${movie != null}">
            
            <div class="card bg-dark text-white h-100">

                <img th:src="${movie.imageUrl}" class="card-img-top" style="height:300px; object-fit:cover;">

                <div class="card-body">
                    <h5 class="card-title" th:text="${movie.title}"></h5>
                    <p class="card-text" th:text="${movie.description}"></p>
                </div>

                <div class="card-footer text-center">
                    ⭐ <span th:text="${movie.rating}"></span>

                    <br><br>

                    <!-- ✏️ Edit -->
                    <a th:href="@{'/edit/' + ${movie.id}}" class="btn btn-warning btn-sm">Edit</a>

                    <!-- 🗑 Delete -->
                    <a th:href="@{'/delete/' + ${movie.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?')">
                       Delete
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
